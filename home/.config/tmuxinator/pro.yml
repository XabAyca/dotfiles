name: Pro

windows:
  - mipise:
      root: ~/documents/mipise
      panes:
        - nvim -c "new | terminal"

  - mps:
      root: ~/documents/mps
      panes:
        - nvim -c "new | terminal"

  - mipise-tools:
      root: ~/documents/mipise_tools
      panes:
        - nvim -c "new | terminal"

  - dotfiles:
      root: ~/.dotfiles
      panes:
        - nvim -c "new | terminal"

  - Wiki:
      root: ~/documents/my_wiki
      panes:
        - nvim note.md
